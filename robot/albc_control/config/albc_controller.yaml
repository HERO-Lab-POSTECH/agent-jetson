# albc_controller node parameters
# All values match original hardcoded defaults

# TD controller gains (base values, before gain_mult scaling)
td_control:
  M_td: 0.004
  Kp_td: 0.04
  Kd_td: 0.55

# PID controller gains (base values)
pid_roll:
  kp: 0.05
  ki: 0.001
  kd: 0.0005

pid_pitch:
  kp: 0.05
  ki: 0.001
  kd: 0.0005

# Gain multiplier
gain_mult: 1.5

# IMU mounting yaw offset (degrees, FRD convention)
imu_yaw_offset: 45.0

# Inverse kinematics
ik:
  num_iterations: 3000
  learning_rate: 0.02
  lambda_base: 0.15

# Loop rate
loop_rate_hz: 50

# Initial joint angles (degrees)
initial_theta1_deg: 90.0
initial_theta2_deg: 90.0

# Control mode (1=TDC, 2=PID, 3=Fixed, 4=Manual)
control_mode: 1

# Manual mode defaults
manual:
  theta1: 90.0
  theta2: 90.0
  x: 0.0
  y: 0.0

