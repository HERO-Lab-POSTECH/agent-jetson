# agent_command node parameters

# DARKNET visual servoing
darknet:
  Kp: 0.1
  Kd: 0.1
  x_target: 320.0
  y_target: 300.0
  saturation: 100.0

# Lawnmower survey pattern
lawnmower:
  sway_num: 300
  surge_num: 50
  move_dis: 0.01

# Teleop keyboard step sizes
teleop:
  xy_step: 0.05
  z_step: 0.01

# Loop rate
loop_rate_hz: 100

# Logging output period (ROS_INFO_THROTTLE seconds)
log_period: 0.5
