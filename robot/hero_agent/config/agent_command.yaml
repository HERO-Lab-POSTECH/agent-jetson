# agent_command node parameters
# All values match original hardcoded defaults for backward compatibility

# QR position control gains
qr_control:
  Kp: 0.005
  Kd: 0.005
  qr_Kp: 65.0
  qr_Kd: 65.0
  qr_Ki: 0.05
  # TDC parameters
  qr_Mb: 0.16
  qr_KKp: 5.0
  qr_KKv: 26.0
  # Saturation limits per mode
  saturation_default: 200.0
  saturation_recovery: 100.0

# QR recovery mode targets [x, y, z]
recovery_targets:
  mode_neg1: [0.00, 0.10, 1.3]
  mode_neg2: [-0.00, 0.10, 0.6]
  mode_1:    [0.00, 0.00, 1.0]
  mode_2:    [0.00, 0.04, 0.6]
  mode_3:    [0.00, 0.04, 0.3]

# DARKNET visual servoing
darknet:
  Kp: 0.1
  Kd: 0.1
  x_target: 320.0
  y_target: 300.0
  saturation: 100.0

# Mosaic survey pattern
mosaic:
  sway_num: 300
  surge_num: 50
  move_dis: 0.01

# Winch model coefficients (quadratic rope model)
winch:
  coeff_a: 0.00171073
  coeff_b: 0.534071
  ticks_per_rev: 4096
  gear_ratio_num: 435.45
  gear_ratio_den: 73.45613

# Teleop keyboard step sizes
teleop:
  xy_step: 0.05
  z_step: 0.01
  winch_step: 10000

# QR outlier rejection
qr_filter:
  distance_threshold: 0.5
  warmup_count: 4

# Convergence criteria
convergence:
  position_tolerance: 0.02
  count_threshold: 30

# Loop rate
loop_rate_hz: 100

# Logging output period (ROS_INFO_THROTTLE seconds)
log_period: 0.5
